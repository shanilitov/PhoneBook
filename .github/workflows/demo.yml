name: Demo Build (Preview APK)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      platform:
        description: 'פלטפורמה לבנייה'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - all

# Restrict default GITHUB_TOKEN permissions to the minimum required
permissions:
  contents: read

# Cancel any in-progress demo build for the same ref so we never queue up stale builds
concurrency:
  group: demo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  demo:
    name: 🚀 EAS Preview Build
    runs-on: ubuntu-latest

    steps:
      # ─── Checkout ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── Node.js ─────────────────────────────────────────────────
      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # ─── Expo / EAS CLI ──────────────────────────────────────────
      - name: Setup Expo & EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      # ─── Dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ─── Build ───────────────────────────────────────────────────
      - name: Build preview (Android)
        if: github.event_name == 'push' || inputs.platform == 'android' || inputs.platform == 'all'
        id: build_android
        run: |
          BUILD_URL=$(eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --json \
            --no-wait | jq -r '.[0].id // empty')
          echo "build_id=${BUILD_URL}" >> "$GITHUB_OUTPUT"
          echo "### 🤖 Android Preview Build" >> "$GITHUB_STEP_SUMMARY"
          echo "Build ID: \`${BUILD_URL}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Track progress: https://expo.dev/builds/${BUILD_URL}" >> "$GITHUB_STEP_SUMMARY"

      - name: Build preview (iOS)
        if: inputs.platform == 'ios' || inputs.platform == 'all'
        id: build_ios
        run: |
          BUILD_URL=$(eas build \
            --platform ios \
            --profile preview \
            --non-interactive \
            --json \
            --no-wait | jq -r '.[0].id // empty')
          echo "build_id=${BUILD_URL}" >> "$GITHUB_OUTPUT"
          echo "### 🍎 iOS Preview Build" >> "$GITHUB_STEP_SUMMARY"
          echo "Build ID: \`${BUILD_URL}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Track progress: https://expo.dev/builds/${BUILD_URL}" >> "$GITHUB_STEP_SUMMARY"

      # ─── Summary ─────────────────────────────────────────────────
      - name: Job summary
        run: |
          echo "## 📱 PhoneBook – Demo Build" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| שדה | ערך |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Triggered by | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Profile | preview |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> לאחר השלמת הבנייה, הורד את ה-APK מדשבורד ה-Expo שלך." >> "$GITHUB_STEP_SUMMARY"
